name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Verify gradients (finite differences)
        run: python gradcheck.py
      - name: Train (smoke test)
        run: python train.py

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install security tools
        run: python -m pip install --upgrade pip bandit pip-audit
      - name: Static analysis (bandit)
        run: bandit -r . --ini .bandit
      - name: Dependency CVE scan (pip-audit)
        run: pip-audit -r requirements.txt
